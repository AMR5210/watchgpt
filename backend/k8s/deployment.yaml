apiVersion: apps/v1
kind: Deployment
metadata:
  name: watchgpt-backend
  namespace: watchgpt
  labels:
    app: watchgpt-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: watchgpt-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: watchgpt-backend
    spec:
      containers:
        - name: watchgpt-backend
          image: <AWS_ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/watchgpt-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
          envFrom:
            - secretRef:
                name: watchgpt-secrets
            - configMapRef:
                name: watchgpt-config
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
      terminationGracePeriodSeconds: 30
